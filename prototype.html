<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fermion B2B V2 // Comprehensive Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Fraunces:ital,opsz,wght@1,9..144,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 260px;
            --fermion-blue: #4A6FFF;
            --bg-lab: #FAF9F6;
            --periwinkle: #7D8AFF;
            --doodle-orange: #FF8A4C;
        }
        body { font-family: 'JetBrains Mono', monospace; color: #101828; }
        .display-font { font-family: 'Fraunces', serif; }
        
        /* THEMES */
        .theme-admin { background-color: #FAF9F6; }
        .theme-admin .sidebar { background-color: #0f172a; color: white; }
        
        .theme-b2b { background-color: #FFFFFF; }
        .theme-b2b .sidebar { background-color: #f8fafc; color: #1e293b; border-right: 1px solid #e2e8f0; }
        .theme-b2b .glass-card { background: #fdfdfd; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }

        /* COMPONENTS */
        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.05); }
        .status-badge { font-size: 8px; font-weight: 900; letter-spacing: 0.1em; padding: 2px 8px; border-radius: 99px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* ANIMATIONS */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(125, 138, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(125, 138, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(125, 138, 255, 0); }
        }
        .active-silver-ring { animation: pulse-ring 2s infinite; }
    </style>
</head>
<body class="theme-admin flex min-h-screen overflow-hidden transition-colors duration-500" id="body-root">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar w-[260px] flex-shrink-0 flex flex-col fixed inset-y-0 left-0 z-50 transition-all duration-500">
        <div class="h-24 flex flex-col justify-center px-8 border-b border-black/5">
            <h1 class="display-font text-2xl italic font-black tracking-tighter" id="logo-text">Fermion.</h1>
            <p id="role-label" class="text-[8px] font-bold uppercase tracking-[0.4em] text-slate-500 mt-1">Command Center</p>
        </div>

        <nav class="flex-1 px-4 py-8 space-y-10 overflow-y-auto no-scrollbar" id="sidebar-nav">
            <!-- Content Injected via JS -->
        </nav>

        <div class="p-6 border-t border-black/5 space-y-4">
            <button onclick="toggleGlobalView()" class="w-full py-3 bg-black/5 hover:bg-black/10 text-[9px] font-black uppercase tracking-widest rounded-xl transition-all border border-black/10" id="view-toggle-btn">Switch to Partner Hub</button>
            <div class="flex items-center gap-3 px-2">
                <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center font-bold text-xs text-white">JD</div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-[10px] font-bold truncate">John Doe</p>
                    <p class="text-[8px] text-slate-500 truncate" id="user-email">admin@fermion.co</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 ml-[260px] h-screen overflow-y-auto">
        <!-- TOP BAR -->
        <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-40 px-12 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <h2 id="header-title" class="font-black italic uppercase tracking-tight text-slate-900">Dashboard Overview</h2>
                <div id="tier-badge-container" class="hidden">
                    <span class="status-badge bg-periwinkle/10 text-periwinkle uppercase border border-periwinkle/20">Tier: Bronze</span>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="relative">
                    <input type="text" placeholder="Search Specimen..." class="bg-slate-100 border-none rounded-full px-10 py-2 text-[10px] font-bold w-64 outline-none focus:ring-2 focus:ring-periwinkle/30">
                    <svg class="absolute left-4 top-2 text-slate-400" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <button class="relative text-slate-400 hover:text-slate-900 transition-colors">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    <span class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
            </div>
        </header>

        <!-- VIEWS -->
        <div id="view-container" class="p-12 space-y-12 max-w-[1400px] mx-auto">
            <!-- Views Injected Here -->
        </div>
    </main>

    <!-- MODAL OVERLAY (For Profile Completion) -->
    <div id="profile-modal" class="fixed inset-0 z-[100] bg-slate-950/60 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-[3.5rem] w-full max-w-xl p-12 space-y-10 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-[0.03] rotate-12"><svg width="160" height="160" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" fill="currentColor"/></svg></div>
            <div class="text-center space-y-2">
                <h2 class="display-font text-4xl italic font-black tracking-tighter text-slate-950">Identity Verification.</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-relaxed">Complete your profile to unlock full dashboard access & showcase your brand.</p>
            </div>
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase tracking-widest text-slate-500 ml-2">Cafe Logo (PNG/SVG)</label>
                    <div class="border-2 border-dashed border-slate-200 rounded-[2rem] p-8 flex flex-col items-center justify-center text-center group hover:bg-slate-50 cursor-pointer transition-colors">
                        <svg class="text-slate-300 group-hover:text-periwinkle transition-colors mb-2" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        <p class="text-[8px] font-black uppercase tracking-widest text-slate-400">Drag & drop logo specimen</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase tracking-widest text-slate-500 ml-2">Tax ID (NPWP)</label>
                        <input type="text" placeholder="00.000..." class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-xs font-bold outline-none ring-2 ring-transparent focus:ring-periwinkle/20 transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black uppercase tracking-widest text-slate-500 ml-2">Billing Ref</label>
                        <input type="text" placeholder="Accounting Dept." class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-xs font-bold outline-none ring-2 ring-transparent focus:ring-periwinkle/20 transition-all">
                    </div>
                </div>
            </div>
            <button onclick="closeProfileModal()" class="w-full py-5 bg-slate-950 text-white rounded-2xl font-black uppercase tracking-[0.3em] italic text-[10px] shadow-xl hover:bg-periwinkle transition-all">Enter Partner Hub</button>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        let state = {
            role: 'admin', // admin | b2b
            page: 'dashboard',
            b2bStep: 'onboarding', // onboarding | active
            b2bVolume: 12.5
        };

        const adminNav = [
            { group: "Intelligence", items: [{ id: 'dashboard', label: 'Overview', icon: '📊' }, { id: 'magic', label: 'Magic Wand', icon: '🪄' }] },
            { group: "Commerce", items: [{ id: 'partners', label: 'B2B Partners', icon: '🤝' }, { id: 'manual', label: 'Manual Ledger', icon: '📝' }] },
            { group: "Operational", items: [{ id: 'fulfillment', label: 'Kanban', icon: '📦' }, { id: 'inventory', label: 'Green Bean', icon: '📉' }] }
        ];

        const b2bNav = [
            { group: "Hub", items: [{ id: 'dashboard', label: 'Overview', icon: '🏛️' }, { id: 'shop', label: 'Wholesale Shop', icon: '🛒' }] },
            { group: "Services", items: [{ id: 'maintenance', label: 'Premium Service', icon: '🛠️' }, { id: 'calibration', label: 'Calibration', icon: '⚖️' }] },
            { group: "Legal", items: [{ id: 'contract', label: 'Agreement', icon: '📜' }, { id: 'ledger', label: 'Commercial Logs', icon: '📄' }] }
        ];

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            const roleLabel = document.getElementById('role-label');
            const viewBtn = document.getElementById('view-toggle-btn');
            const logo = document.getElementById('logo-text');
            const menu = state.role === 'admin' ? adminNav : b2bNav;
            
            roleLabel.innerText = state.role === 'admin' ? 'Command Center' : 'Partner Hub';
            viewBtn.innerText = state.role === 'admin' ? 'Switch to Partner Hub' : 'Switch to Command Center';
            logo.className = `display-font text-2xl italic font-black tracking-tighter ${state.role === 'admin' ? 'text-white' : 'text-slate-900'}`;

            nav.innerHTML = menu.map(group => `
                <div class="space-y-4">
                    <h4 class="px-4 text-[9px] font-black text-slate-500 uppercase tracking-widest">${group.group}</h4>
                    <div class="space-y-1">
                        ${group.items.map(item => `
                            <button onclick="navigate('${item.id}')" class="w-full flex items-center gap-4 px-4 py-3 rounded-2xl text-[11px] font-bold ${state.page === item.id ? (state.role === 'admin' ? 'bg-white/10 text-white border-l-4 border-periwinkle' : 'bg-slate-200/50 text-slate-900 border-l-4 border-periwinkle') : 'text-slate-400 hover:text-slate-600 transition-all'} group">
                                <span class="text-lg">${item.icon}</span>
                                <span class="uppercase tracking-widest">${item.label}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function navigate(pageId) {
            state.page = pageId;
            renderSidebar();
            renderView();
        }

        function toggleGlobalView() {
            state.role = state.role === 'admin' ? 'b2b' : 'admin';
            document.getElementById('body-root').className = state.role === 'admin' ? 'theme-admin flex min-h-screen overflow-hidden' : 'theme-b2b flex min-h-screen overflow-hidden';
            document.getElementById('tier-badge-container').className = state.role === 'admin' ? 'hidden' : 'block';
            
            if (state.role === 'b2b' && state.b2bStep === 'onboarding') {
                navigate('onboarding');
            } else {
                navigate('dashboard');
            }
        }

        function renderView() {
            const container = document.getElementById('view-container');
            const title = document.getElementById('header-title');
            
            if (state.role === 'admin') {
                if (state.page === 'dashboard') {
                    title.innerText = 'Command Overview';
                    container.innerHTML = `
                        <!-- CHURN ALERT -->
                        <div class="bg-red-50 border border-red-100 rounded-[2.5rem] p-10 flex items-center justify-between relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-8 opacity-10"><svg width="120" height="120" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L1 21h22L12 2zm0 3.45L20.14 19H3.86L12 5.45zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg></div>
                            <div class="flex items-center gap-10">
                                <div class="w-20 h-20 bg-red-500 rounded-3xl flex items-center justify-center text-white shadow-xl shadow-red-500/20"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg></div>
                                <div>
                                    <span class="status-badge bg-red-500 text-white uppercase">Churn_Alert</span>
                                    <h3 class="display-font text-3xl italic font-black mt-2">Buku Janari Cafe Inactive</h3>
                                    <p class="text-xs font-bold text-red-400 tracking-widest mt-1 uppercase">48 Days No Order Protocol</p>
                                </div>
                            </div>
                            <button class="bg-slate-950 text-white px-10 py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-[10px] hover:bg-red-600 transition-all">Re-Engage via WA</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-10">
                            ${mockStatCard('REVENUE', 'Rp 2.71M', '+12%', 'Live')}
                            ${mockStatCard('VOLUME', '4.3 Kg', '8.2', 'Monthly')}
                            ${mockStatCard('PARTNERS', '14', '2', 'Active')}
                            ${mockStatCard('PENDING', '0', 'Clean', 'Safety')}
                        </div>
                    `;
                } else if (state.page === 'fulfillment') {
                    title.innerText = 'Fulfillment Pipeline';
                    container.innerHTML = `
                        <div class="grid grid-cols-3 gap-10 h-[600px]">
                            ${mockKanbanCol('Incoming', 2, `
                                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 space-y-4 shadow-sm">
                                    <p class="text-[8px] font-black text-slate-300 uppercase">#ORD-0922</p>
                                    <h4 class="font-black italic uppercase text-lg">Fore Coffee</h4>
                                    <p class="text-[10px] font-bold text-slate-400">20.0 KG // ESPRESSO_V2</p>
                                    <button class="w-full py-4 bg-periwinkle/10 text-periwinkle rounded-xl text-[9px] font-black uppercase tracking-widest">Request Biteship Pickup</button>
                                </div>
                            `)}
                            ${mockKanbanCol('QC & Packaging', 1, `
                                <div class="bg-slate-900 p-8 rounded-[2.5rem] border-2 border-periwinkle space-y-6 text-white shadow-2xl">
                                    <div class="flex justify-between items-start">
                                        <h4 class="font-black italic uppercase">Common Grounds</h4>
                                        <span class="status-badge bg-periwinkle text-white">ROASTING</span>
                                    </div>
                                    <div class="space-y-4">
                                        ${mockSlider('Sweetness', 4.5)}
                                        ${mockSlider('Acidity', 3.2)}
                                        ${mockSlider('Body', 4.0)}
                                    </div>
                                    <button class="w-full py-4 bg-periwinkle text-white rounded-xl text-[9px] font-black uppercase tracking-[0.2em] shadow-lg shadow-periwinkle/30">Submit QC Profile</button>
                                </div>
                            `)}
                            ${mockKanbanCol('Shipped', 84, `<div class="p-12 text-center opacity-20"><p class="text-[10px] font-black uppercase tracking-widest italic">Automated via Webhook</p></div>`)}
                        </div>
                    `;
                } else if (state.page === 'partners') {
                   title.innerText = 'B2B Partner Verification';
                   container.innerHTML = `
                        <div class="bg-white rounded-[3rem] border border-slate-100 overflow-hidden shadow-sm">
                            <table class="w-full text-left">
                                <tr class="bg-slate-50 border-b border-slate-100 text-[9px] font-black text-slate-400 uppercase tracking-[0.3em]">
                                    <th class="p-8">Cafe Name</th>
                                    <th class="p-8">Contract</th>
                                    <th class="p-8">Quota Target</th>
                                    <th class="p-8 text-right">Actions</th>
                                </tr>
                                <tr class="border-b border-slate-50">
                                    <td class="p-8 font-black uppercase italic">Kopi Kenangan Senayan</td>
                                    <td class="p-8"><button class="text-periwinkle flex items-center gap-2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> <span class="text-[10px] font-black underline uppercase">View_Contract.pdf</span></button></td>
                                    <td class="p-8 font-bold">15 KG / MO</td>
                                    <td class="p-8 text-right"><button class="px-6 py-3 bg-periwinkle text-white text-[9px] font-black uppercase rounded-xl">Approve</button></td>
                                </tr>
                            </table>
                        </div>
                   `;
                } else if (state.page === 'manual') {
                    title.innerText = 'Manual Transaction Ledger';
                    container.innerHTML = `
                        <div class="flex justify-between items-center mb-10">
                            <h3 class="display-font text-3xl italic font-black">Offline Protocol.</h3>
                            <button onclick="alert('Manual Entry Logic Activated')" class="bg-slate-950 text-white px-8 py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-[10px] shadow-xl">+ Input Manual Transaction</button>
                        </div>
                        <div class="bg-white rounded-[3rem] border border-slate-100 p-20 flex flex-col items-center justify-center text-center space-y-4 opacity-50 grayscale">
                             <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                             <p class="text-[10px] font-black uppercase tracking-[0.3em]">Historical Data Entry Portal</p>
                        </div>
                    `;
                }
            } else {
                // B2B VIEW
                if (state.page === 'onboarding') {
                    title.innerText = 'Registration Pipeline';
                    container.innerHTML = `
                        <div class="max-w-4xl mx-auto space-y-12">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                                <div class="glass-card p-12 rounded-[4rem] space-y-8">
                                    <div class="w-16 h-16 bg-periwinkle/10 rounded-3xl flex items-center justify-center text-periwinkle"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></div>
                                    <div class="space-y-2">
                                        <h3 class="display-font text-3xl italic font-black">Step 1.</h3>
                                        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Download Partnership Agreement</p>
                                    </div>
                                    <button class="w-full py-5 bg-periwinkle text-white font-black uppercase tracking-widest rounded-2xl shadow-xl shadow-periwinkle/20">Download .PDF</button>
                                </div>
                                <div class="glass-card p-12 rounded-[4rem] space-y-8 border-2 border-dashed border-periwinkle">
                                    <div class="w-16 h-16 bg-periwinkle/10 rounded-3xl flex items-center justify-center text-periwinkle"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></div>
                                    <div class="space-y-2">
                                        <h3 class="display-font text-3xl italic font-black">Step 2.</h3>
                                        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Upload Signed Contract</p>
                                    </div>
                                    <div class="border border-slate-200 border-dashed rounded-2xl p-4 text-center cursor-pointer hover:bg-slate-50">
                                        <p class="text-[9px] font-black uppercase text-slate-400">Click to Select File</p>
                                    </div>
                                </div>
                            </div>

                            <div class="glass-card p-12 rounded-[4rem] flex items-center justify-between relative overflow-hidden bg-gradient-to-r from-white to-slate-50">
                                <div class="space-y-4">
                                    <span class="status-badge bg-amber-500 text-white">STATUS: AWAITING_CONTRACT_REVIEW</span>
                                    <h3 class="display-font text-4xl italic font-black text-slate-900 leading-none tracking-tighter">En Route to <br/> Laboratory.</h3>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">"Si Gunung" is verifying your documents</p>
                                </div>
                                <div class="w-48 h-48 relative animate-float">
                                    <div class="w-full h-full bg-periwinkle/5 rounded-full flex items-center justify-center border border-periwinkle/10">
                                        <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="var(--periwinkle)" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                    </div>
                                    <div class="absolute -top-4 -right-4 bg-periwinkle text-white p-4 rounded-3xl shadow-xl text-center"><p class="text-[8px] font-black uppercase">Reviewing<br/>Phase</p></div>
                                </div>
                            </div>
                            <button onclick="openProfileModal()" class="w-full py-3 text-[9px] font-black uppercase underline text-slate-300">Secret: Force Approve & Complete Profile (Sim)</button>
                        </div>
                    `;
                } else if (state.page === 'dashboard') {
                    title.innerText = 'Partner Portal Overview';
                    container.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                            <!-- PROGRESS RING -->
                            <div class="glass-card p-12 rounded-[4rem] flex flex-col items-center justify-center text-center space-y-8 relative overflow-hidden">
                                <div class="w-48 h-48 rounded-full border-[14px] border-slate-50 flex items-center justify-center relative ${state.b2bVolume >= 15 ? 'active-silver-ring' : ''}">
                                    <svg class="absolute inset-0 w-full h-full -rotate-90">
                                        <circle cx="96" cy="96" r="82" stroke="currentColor" stroke-width="14" fill="transparent" class="text-periwinkle" stroke-dasharray="515" stroke-dashoffset="${515 - (state.b2bVolume / 15 * 515)}" stroke-linecap="round" />
                                    </svg>
                                    <div class="space-y-0.5">
                                        <p class="text-5xl font-black italic tracking-tighter text-slate-900">${state.b2bVolume}</p>
                                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">/ 15.0 KG</p>
                                    </div>
                                </div>
                                <div class="space-y-4">
                                    <h4 class="font-black uppercase italic text-sm text-slate-900">Volume Velocity</h4>
                                    ${state.b2bVolume >= 15 ? 
                                        `<button onclick="alert('Silver Tier Claimed!')" class="bg-gradient-to-r from-orange-400 to-orange-600 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] shadow-xl shadow-orange-500/20">Claim Silver Tier</button>` :
                                        `<p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-relaxed">${(15 - state.b2bVolume).toFixed(1)}kg left to unlock <br/> <span class="text-periwinkle">Silver Tier Discount</span> next month</p>`
                                    }
                                </div>
                            </div>

                            <!-- SHOP GATEWAY -->
                            <div class="md:col-span-2 space-y-10">
                                <div class="p-12 rounded-[3.5rem] bg-slate-900 text-white flex items-center justify-between relative overflow-hidden group shadow-2xl">
                                    <div class="absolute inset-0 bg-gradient-to-br from-periwinkle/20 via-transparent to-transparent"></div>
                                    <div class="space-y-6 relative z-10 flex-1">
                                        <div class="space-y-1">
                                            <span class="status-badge bg-periwinkle text-white">BRONZE_ACTIVE</span>
                                            <h3 class="display-font text-5xl italic font-black tracking-tighter leading-none">Enter <br/> Wholesale.</h3>
                                        </div>
                                        <p class="text-xs text-slate-400 font-medium tracking-wide">Locked Pricing: -Rp 10.000 / Kg applied to all specimens.</p>
                                        <button class="bg-white text-slate-900 px-10 py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-[10px] hover:bg-periwinkle hover:text-white transition-all">Start Procurement</button>
                                    </div>
                                    <div class="w-40 h-40 bg-white/5 rounded-[3rem] rotate-12 flex items-center justify-center opacity-40 group-hover:rotate-0 transition-transform duration-700">
                                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                                    </div>
                                </div>

                                <div class="grid grid-cols-2 gap-8">
                                    <div class="glass-card p-10 rounded-[3rem] space-y-4">
                                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic leading-none">Days Remaining</p>
                                        <h4 class="text-4xl font-black italic tracking-tighter text-slate-900">134 <span class="text-lg text-slate-300">DAYS</span></h4>
                                        <span class="status-badge bg-green-50 text-green-600">CONTRACT_ID: #FM-0922</span>
                                    </div>
                                    <div class="glass-card p-10 rounded-[3rem] bg-slate-50 flex items-center justify-center opacity-40">
                                        <p class="text-[9px] font-black uppercase tracking-widest text-slate-300 italic">Biteship Webhook Idle</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- MAINTENANCE TEASER -->
                        <div class="glass-card p-12 rounded-[4rem] bg-slate-900 text-white flex items-center justify-between relative overflow-hidden grayscale opacity-50 group cursor-not-allowed">
                             <div class="space-y-6">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-white"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.7a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.7z"></path></svg></div>
                                    <h3 class="display-font text-3xl italic font-black">Fermion Premium Service.</h3>
                                </div>
                                <p class="text-xs text-slate-400 font-medium tracking-wide">Machine calibration and grinder maintenance provided 2x per contract cycle.</p>
                             </div>
                             <div class="text-right space-y-2">
                                <span class="status-badge border border-white/20 text-white">LOCKED_PROTOCOL</span>
                                <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Requires Contract Sequence #2</p>
                             </div>
                        </div>
                    `;
                }
            }
        }

        function mockStatCard(label, val, change, sub) {
            return `
                <div class="glass-card p-10 rounded-[3.5rem] space-y-6 group hover:shadow-2xl transition-all duration-500">
                    <div class="flex justify-between items-start">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${label}</p>
                        <span class="text-[8px] font-black text-periwinkle uppercase tracking-widest">${sub}</span>
                    </div>
                    <div>
                        <h4 class="text-4xl font-black italic tracking-tighter text-slate-900">${val}</h4>
                        <p class="text-[9px] text-green-500 font-black uppercase mt-1 tracking-widest">${change}</p>
                    </div>
                </div>
            `;
        }

        function mockKanbanCol(name, count, content) {
            return `
                <div class="space-y-6 flex flex-col h-full">
                    <div class="flex justify-between items-center px-4">
                        <span class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">${name}</span>
                        <span class="text-[10px] font-black bg-white border border-slate-100 px-3 py-1 rounded-full">${count}</span>
                    </div>
                    <div class="flex-1 space-y-6 no-scrollbar overflow-y-auto">
                        ${content}
                    </div>
                </div>
            `;
        }

        function mockSlider(label, val) {
            return `
                <div class="space-y-2">
                    <div class="flex justify-between text-[9px] font-black uppercase tracking-widest text-slate-400"><span>${label}</span><span class="text-periwinkle">${val}/5.0</span></div>
                    <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                        <div class="h-full bg-periwinkle transition-all" style="width: ${val/5*100}%"></div>
                    </div>
                </div>
            `;
        }

        function openProfileModal() { document.getElementById('profile-modal').classList.remove('hidden'); }
        function closeProfileModal() { 
            document.getElementById('profile-modal').classList.add('hidden'); 
            state.b2bStep = 'active';
            navigate('dashboard');
        }

        // Initial Boot
        renderSidebar();
        renderView();
    </script>
</body>
</html>
