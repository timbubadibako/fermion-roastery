<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fermion Footer Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-10">

    <footer class="relative w-full bg-black text-white py-20 overflow-hidden min-h-[500px] flex flex-col justify-end">
        <!-- Giant Background Text -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[15rem] font-black text-white/5 select-none pointer-events-none tracking-tighter">
            FERMION
        </div>

        <div class="relative z-10 max-w-7xl mx-auto px-6 w-full grid grid-cols-1 md:grid-cols-3 gap-12">
            
            <!-- Address/GPS -->
            <div>
                <h3 class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-4">Location</h3>
                <p class="text-lg font-light">Jl. Kopi No. 123,<br>Jakarta Selatan, Indonesia</p>
                <p class="mt-4 text-sm text-gray-500 font-mono">-6.2088° S, 106.8456° E</p>
            </div>

            <!-- Links/Feedback -->
            <div>
                <h3 class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-4">Engagement</h3>
                <button class="bg-white text-black px-6 py-3 rounded-full font-bold hover:bg-gray-200 transition-colors">
                    Quick Feedback
                </button>
            </div>

            <!-- Branding -->
            <div class="text-right">
                <h2 class="text-4xl font-black">FERMION</h2>
                <p class="text-gray-500 mt-2">© 2026 Fermion Roastery</p>
            </div>
        </div>
    </footer>

</body>
</html>
